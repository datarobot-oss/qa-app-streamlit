runtimeParameterDefinitions:
- fieldName: APP_NAME
  type: string
  defaultValue: "Q&A Chat Application"
- fieldName: CUSTOM_METRIC_ID
  type: string
- fieldName: DEPLOYMENT_ID
  type: deployment
- fieldName: ENABLE_CHAT_API
  type: boolean
  defaultValue: True
  description: Use Chat API if the deployment supports it.
- fieldName: SYSTEM_PROMPT
  type: string
  description: Replaces the system prompt set in Playground. Requires ENABLE_CHAT_API to be `True`.
- fieldName: ENABLE_CHAT_API_STREAMING
  type: boolean
  defaultValue: False
  description: Stream the response from Chat API. Requires ENABLE_CHAT_API to be `True`.
- fieldName: DATAROBOT_LLM_MODEL
  type: string
  defaultValue: "datarobot/azure/gpt-5-1-2025-11-13"
  description: LiteLLM model string for the DataRobot LLM Gateway. Used when DEPLOYMENT_ID is not set. Find available models with datarobot.genai.LLMGatewayCatalog().list_as_dict().
